x-backend-common: &backend-common
  image: medadhere-backend:latest
  pull_policy: never
  env_file:
    - .env
  environment: &backend-environment
    DJANGO_SETTINGS_MODULE: config.settings.development
    DB_HOST: db
    DB_PORT: 5432
    DB_NAME: ${DB_NAME:-medadhere}
    DB_USER: ${DB_USER:-postgres}
    DB_PASSWORD: ${DB_PASSWORD:-root}
    REDIS_URL: redis://redis:6379/0
    AI_MODEL_DIR: /app/apps/ai_engine/models/artifacts
    AI_DATA_DIR: /app/apps/ai_engine/datasets/raw
    WAIT_FOR_DB: "true"
    WAIT_FOR_REDIS: "true"
    # Phase 4: WhatsApp Alerts (Twilio)
    TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
    TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
    TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-medadhere}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-medadhere}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    <<: *backend-common
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "true"
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "120"]
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - ai_artifacts:/app/apps/ai_engine/models/artifacts
      - ai_data:/app/apps/ai_engine/datasets/raw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git/
            - .venv/
            - env/
            - __pycache__/
            - "**/*.pyc"
            - reports/
            - db.sqlite3
            - media/
            - .pytest_cache/
            - .mypy_cache/
            - .ruff_cache/
        - action: rebuild
          path: requirements.txt

  celery-worker:
    <<: *backend-common
    restart: unless-stopped
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "false"
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    volumes:
      - ai_artifacts:/app/apps/ai_engine/models/artifacts
      - ai_data:/app/apps/ai_engine/datasets/raw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git/
            - .venv/
            - env/
            - __pycache__/
            - "**/*.pyc"
            - reports/
            - db.sqlite3
            - media/
            - .pytest_cache/
            - .mypy_cache/
            - .ruff_cache/

  celery-beat:
    <<: *backend-common
    restart: unless-stopped
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "false"
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    volumes:
      - ai_artifacts:/app/apps/ai_engine/models/artifacts
      - ai_data:/app/apps/ai_engine/datasets/raw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git/
            - .venv/
            - env/
            - __pycache__/
            - "**/*.pyc"
            - reports/
            - db.sqlite3
            - media/
            - .pytest_cache/
            - .mypy_cache/
            - .ruff_cache/

volumes:
  postgres_data:
  redis_data:
  media_data:
  ai_artifacts:
  ai_data:
